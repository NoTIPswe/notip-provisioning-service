name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  quality-checks:
    name: Quality Checks
    uses: ./.github/workflows/quality-checks.yml
    secrets: inherit

  release:
    name: Semantic Release
    needs: quality-checks
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/notipswe/notip-nest-dev:v0.0.1
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.semantic.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true # required for @semantic-release/git to push back to main
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Validate semantic-release token
        env:
          SEMANTIC_RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          if [ -z "$SEMANTIC_RELEASE_TOKEN" ]; then
            echo "SEMANTIC_RELEASE_TOKEN is required for semantic-release push on protected main"
            exit 1
          fi

      - name: Cache npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        id: semantic
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          PREV_VERSION=$(node -p "require('./package.json').version")
          npx semantic-release
          NEW_VERSION=$(node -p "require('./package.json').version")
          if [ "$NEW_VERSION" != "$PREV_VERSION" ]; then
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  # Runs only when semantic-release actually cut a new version.
  # Must run on ubuntu-latest (not inside a container) to have Docker available.
  docker:
    name: Build & Push Docker image
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Generates the OpenAPI JSON from the NestJS app, then opens a PR on
  # notip-infra to replace the API definition file.
  openapi-sync:
    name: Sync OpenAPI spec to notip-infra
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/notipswe/notip-nest-dev:v0.0.1

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.version }}

      - name: Cache npm cache
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-cache-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-cache-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate OpenAPI spec
        run: npm run generate:openapi

      - name: Checkout notip-infra
        uses: actions/checkout@v6
        with:
          repository: notipswe/notip-infra
          # Requires NOTIP_INFRA_WRITE_PAT secret: a Personal Access Token with repo scope on notip-infra.
          token: ${{ secrets.NOTIP_INFRA_WRITE_PAT }}
          path: notip-infra

      - name: Replace API definition in notip-infra
        run: cp openapi.json notip-infra/api-contracts/openapi/provisioning-api.json

      - name: Open PR on notip-infra
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.NOTIP_INFRA_WRITE_PAT }}
          path: notip-infra
          commit-message: 'feat(api): update notip-provisioning-service spec to v${{ needs.release.outputs.version }}'
          title: 'feat(api): update notip-provisioning-service spec to v${{ needs.release.outputs.version }}'
          body: |
            Automated OpenAPI spec update from **notip-provisioning-service**.

            - **Version**: `v${{ needs.release.outputs.version }}`
            - **Source release**: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.release.outputs.version }}
          branch: 'feat/update-provisioning-service-spec-v${{ needs.release.outputs.version }}'
          base: main
